name: Plannotator compatibility
on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:
jobs:
  contract:
    strategy:
      fail-fast: false
      matrix:
        plannotator: ["0.23.1", "latest"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save @plannotator/pi-extension@${{ matrix.plannotator }}
      - run: npm run test:compat
      - run: npm run typecheck
      - run: npm test
